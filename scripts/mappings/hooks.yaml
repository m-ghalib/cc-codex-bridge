# Hook event mapping: Claude Code event names -> Codex equivalents
# Events without a codex_event are unsupported and will be skipped with a warning.

events:
  PreToolUse:
    codex_event: PreToolUse
    notes: "Codex only intercepts Bash tool; matcher translated accordingly"
  PostToolUse:
    codex_event: PostToolUse
    notes: "Codex only intercepts Bash tool"
  SessionStart:
    codex_event: SessionStart
    notes: "Codex matcher uses 'source' field (startup|resume)"
  UserPromptSubmit:
    codex_event: UserPromptSubmit
    notes: "Direct mapping"
  Stop:
    codex_event: Stop
    notes: "Codex matcher not currently used"

  # Unsupported events (no Codex equivalent)
  SessionEnd: null
  SubagentStart: null
  SubagentStop: null
  PreCompact: null
  PostCompact: null
  PermissionRequest: null
  PermissionDenied: null
  Notification: null
  TaskCreated: null
  TaskCompleted: null
  StopFailure: null
  TeammateIdle: null
  InstructionsLoaded: null
  ConfigChange: null
  CwdChanged: null
  FileChanged: null
  WorktreeCreate: null
  WorktreeRemove: null
  PostToolUseFailure: null
  Elicitation: null
  ElicitationResult: null

# Handler type mapping
handler_types:
  command: "command"
  http: null      # Codex has no HTTP handlers
  prompt: null    # Codex has no prompt handlers
  agent: null     # Codex has no agent handlers
