name: Refresh upstream CLI docs

on:
  schedule:
    - cron: "0 13 * * MON"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install repo dependencies
        run: uv sync --frozen --extra dev
        working-directory: plugins/cc-bridge

      - name: Fetch upstream docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python scripts/refresh_cli_docs.py
        working-directory: plugins/cc-bridge

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CLAUDE_BOT_PAT }}
          branch: bots/cli-refresh
          commit-message: "chore: refresh upstream CLI docs"
          title: "Refresh upstream CLI docs"
          body: |
            Weekly refresh of upstream CLI docs.

            Review the diff under `plugins/cc-bridge/docs/platform-snapshots/`. If anything
            schema-shaped changed (frontmatter fields, hook events, settings
            keys, tool names, or agent docs), update the bridge logic in
            `plugins/cc-bridge/scripts/adapters/codex.py`,
            `plugins/cc-bridge/scripts/readers/`, or
            `plugins/cc-bridge/docs/specs/2026-04-22-cc-bridge-design.md`.

            If the diff is noise (release timestamps or unrelated docs churn),
            just merge.
          labels: cli-refresh
          add-paths: plugins/cc-bridge/docs/platform-snapshots/**
